<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Book list</title>
</head>
<body>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Books</h1>

    <div>
      <span>Logged in as: <b th:text="${username}">username</b></span>

      <form th:action="@{/logout}" method="post" style="display:inline; margin-left:12px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
      </form>
    </div>
  </div>

  <p><a th:href="@{/add}">Add new book</a></p>

  <table border="1">
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>
        <th>ISBN</th>
        <th>Price</th>
        <th>Category</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.year}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.price}"></td>
        <td th:text="${book.category != null ? book.category.name : ''}"></td>
        <td>
          <span th:if="${isAdmin}">
            <a th:href="@{/delete/{id}(id=${book.id})}">Delete</a>
            |
          </span>
          <a th:href="@{/edit/{id}(id=${book.id})}">Edit</a>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>
